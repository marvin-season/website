<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>who.mrvn.site</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="mx-auto flex min-h-screen max-w-3xl items-center px-6 py-16">
      <section id="card" class="w-full rounded-2xl border border-slate-800 bg-slate-900/70 p-8 shadow-2xl shadow-cyan-950/40 backdrop-blur">
        <p id="badge" class="mb-4 inline-flex rounded-full border border-cyan-400/40 bg-cyan-400/10 px-3 py-1 text-xs font-medium text-cyan-300">Tailwind + Motion CDN</p>
        <h1 id="title" class="text-3xl font-bold tracking-tight md:text-4xl">who.mrvn.site</h1>
        <p id="desc" class="mt-4 text-slate-300">Static site is running and optimized with CDN resources.</p>
      </section>
    </main>

    <script type="module">
      import { animate, stagger } from "https://cdn.jsdelivr.net/npm/motion@12.23.24/+esm";
      animate("#card", { opacity: [0, 1], y: [24, 0], scale: [0.98, 1] }, { duration: 0.5, easing: "ease-out" });
      animate(["#badge", "#title", "#desc"], { opacity: [0, 1], y: [12, 0] }, { delay: stagger(0.08), duration: 0.45, easing: "ease-out" });
    </script>
  </body>
</html>
